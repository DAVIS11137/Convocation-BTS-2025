<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convocation BTS 2025</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#ff0080,#7928ca,#00c6ff);
            background-size:400% 400%;
            animation:bg 8s ease infinite;
            font-family:Arial, sans-serif;
            overflow:hidden;
        }

        h1{
            font-size:5rem;
            text-align:center;
            color:black;
            text-shadow:
                0 0 10px #fff,
                0 0 20px #fff,
                0 0 40px #00ffff,
                0 0 80px #00ffff;
            animation:pulse 2s infinite;
        }

        @keyframes pulse{
            0%,100%{
                transform:scale(1);
            }
            50%{
                transform:scale(1.1);
            }
        }

        @keyframes bg{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }
    </style>
</head>
<body>

    <h1> DIEU N'EST PAS GAWA OH </h1>

</body>
</html>
